<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoForge — 选择版本</title>
  <meta name="description" content="选择进入 AutoForge 企业版或个人版页面。" />
  <style>
    :root {
      --bg: #0b1020;
      --bg-card: #131a2e;
      --border: rgba(255,255,255,0.08);
      --text: #f5f7fb;
      --muted: #9fb0d0;
      --blue: #4f8cff;
      --blue-2: #72b0ff;
      --purple: #8b5cf6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(79,140,255,0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.18), transparent 28%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .page {
      width: 100%;
      max-width: 1080px;
    }
    .hero {
      text-align: center;
      margin-bottom: 40px;
    }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid rgba(79,140,255,0.35);
      border-radius: 999px;
      color: var(--blue-2);
      font-size: 14px;
      margin-bottom: 18px;
      background: rgba(79,140,255,0.08);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.1;
    }
    .subtitle {
      margin: 0 auto;
      max-width: 760px;
      font-size: 18px;
      line-height: 1.75;
      color: var(--muted);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 32px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02)), var(--bg-card);
      border: 1px solid var(--border);
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      min-height: 280px;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(79,140,255,0.35);
      box-shadow: 0 18px 50px rgba(0,0,0,0.28);
    }
    .card-tag {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      color: var(--blue-2);
      background: rgba(79,140,255,0.1);
      border: 1px solid rgba(79,140,255,0.22);
      margin-bottom: 18px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 32px;
    }
    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }
    .points {
      margin: 22px 0 0;
      padding-left: 18px;
      color: var(--text);
    }
    .points li {
      margin-bottom: 10px;
      color: var(--muted);
    }
    .enter {
      margin-top: 26px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      padding: 14px 20px;
      border-radius: 14px;
    }
    @media (max-width: 768px) {
      body { padding: 20px; }
      .cards { grid-template-columns: 1fr; }
      .card { min-height: auto; }
      .subtitle { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="badge">AutoForge</div>
      <h1>你在为谁而构建？</h1>
      <p class="subtitle">
        为企业级产线而来，还是为你自己的下一个项目而来。
      </p>
    </section>

    <section class="cards">
      <a class="card" href="./enterprise.html">
        <div class="card-tag">Enterprise</div>
        <h2>企业版</h2>
        <p>无缝接入成熟框架体系，告别人工适配。MES 联调、权限配置、非标胶水代码，10 分钟完成。</p>
        <ul class="points">
          <li>标准化设备库一键接入</li>
          <li>HITL 人机协同审核机制</li>
          <li>面向企业级产线规模交付</li>
        </ul>
        <span class="enter">进入企业版 →</span>
      </a>

      <a class="card" href="./personal/index.html">
        <div class="card-tag">Personal</div>
        <h2>个人版</h2>
        <p>全球首个带微秒级物理防撞沙盒的工业 AI IDE。仅需表格与文档，一杯咖啡，交付整条产线的源码。</p>
        <ul class="points">
          <li>微秒级物理防撞沙盒验证</li>
          <li>万国牌硬件 Skill 生态</li>
          <li>透明定价，利润 100% 归你</li>
        </ul>
        <span class="enter">进入个人版 →</span>
      </a>
    </section>
  </main>
</body>
</html>
